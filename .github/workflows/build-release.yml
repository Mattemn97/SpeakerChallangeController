name: Test, Build and Release EXE

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: write  # necessario per creare la release

jobs:
  test:
    name: Run Pytest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest colorama

  build:
    name: Build EXE
    runs-on: windows-latest
    needs: test  # ⬅️ esegui solo se i test passano

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build EXE
        run: |
          pyinstaller --onefile main.py

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: my_executable
          path: dist/main.exe

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build  # ⬅️ solo dopo build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: my_executable
          path: ./dist

      - name: Copy config files
        run: |
          cp config.txt dist/
          cp news.txt dist/

      - name: Create ZIP file
        run: |
          cd dist
          zip -r SpeakerChallangeController-Release.zip main.exe config.txt news.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "Release ${{ github.run_number }}"
          files: ./dist/SpeakerChallangeController-Release.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
